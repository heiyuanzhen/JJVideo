<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIJian - 项目管理</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/layui/2.8.0/css/layui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 顶部导航栏 */
        .top-nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.6);
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-right {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .stat-card:nth-child(1)::before {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .stat-card:nth-child(2)::before {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-card:nth-child(3)::before {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-card:nth-child(4)::before {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-card:nth-child(1) .stat-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-card:nth-child(2) .stat-icon {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .stat-card:nth-child(3) .stat-icon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .stat-card:nth-child(4) .stat-icon {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .stat-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 主内容区 */
        .main-content {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            min-height: calc(100vh - 200px);
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .toolbar-actions {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.6);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        /* 筛选标签 */
        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .filter-tab:hover:not(.active) {
            border-color: #667eea;
            color: #667eea;
        }

        .project-name-main {
            font-weight: 600;
            color: #111827;
        }

        .project-name-meta {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }
        
        /* Timeline */
        .timeline {
            padding: 20px 0;
        }
        
        .timeline-item {
            display: flex;
            gap: 20px;
            padding: 15px 0;
            border-left: 2px solid #e0e0e0;
            padding-left: 30px;
            position: relative;
        }
        
        .timeline-item::before {
            content: '';
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            position: absolute;
            left: -7px;
            top: 20px;
        }
        
        .timeline-time {
            color: #999;
            font-size: 13px;
            white-space: nowrap;
            min-width: 150px;
        }
        
        .timeline-content {
            color: #333;
            font-size: 14px;
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav">
        <div class="nav-left">
            <button class="back-btn" onclick="window.location.href='/'">
                <i class="fa fa-arrow-left"></i>
                返回首页
            </button>
            <h1 class="page-title">📁 项目管理</h1>
        </div>
        <div class="nav-right">
            <button class="nav-btn" onclick="window.location.href='/commentary'">
                <i class="fa fa-microphone"></i>
                原创解说
            </button>
            <button class="nav-btn" onclick="window.location.href='/remix'">
                <i class="fa fa-scissors"></i>
                混剪模式
            </button>
            <button class="nav-btn" onclick="window.location.href='/voiceover'">
                <i class="fa fa-volume-up"></i>
                AI配音
            </button>
            <button class="nav-btn" onclick="window.location.href='/editor'">
                <i class="fa fa-film"></i>
                编辑器
            </button>
            <button class="nav-btn" onclick="window.location.href='/settings'">
                <i class="fa fa-cog"></i>
                设置
            </button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fa fa-folder"></i>
            </div>
            <div class="stat-title">总项目数</div>
            <div class="stat-value" id="total-projects">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fa fa-clock"></i>
            </div>
            <div class="stat-title">处理中</div>
            <div class="stat-value" id="processing-projects">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fa fa-check-circle"></i>
            </div>
            <div class="stat-title">已完成</div>
            <div class="stat-value" id="completed-projects">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fa fa-star"></i>
            </div>
            <div class="stat-title">收藏项目</div>
            <div class="stat-value" id="favorite-projects">0</div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" placeholder="搜索项目名称、标签..." id="search-input">
                <i class="fa fa-search"></i>
            </div>
            <div class="toolbar-actions">
                <button class="btn-secondary" onclick="refreshProjects()">
                    <i class="fa fa-sync-alt"></i> 刷新
                </button>
                <button class="btn-primary" onclick="createNewProject()">
                    <i class="fa fa-plus"></i> 新建项目
                </button>
            </div>
        </div>

        <!-- 筛选标签 -->
        <div class="filter-tabs">
            <div class="filter-tab active" data-filter="all">
                <i class="fa fa-list"></i> 全部项目
            </div>
            <div class="filter-tab" data-filter="commentary">
                <i class="fa fa-microphone"></i> 原创解说
            </div>
            <div class="filter-tab" data-filter="remix">
                <i class="fa fa-scissors"></i> 混剪模式
            </div>
            <div class="filter-tab" data-filter="voiceover">
                <i class="fa fa-volume-up"></i> AI配音
            </div>
            <div class="filter-tab" data-filter="favorite">
                <i class="fa fa-star"></i> 收藏
            </div>
        </div>

<div class="layui-row layui-col-space15">
    
    <!-- 项目统计 -->
    <div class="layui-col-md12">
        <div class="layui-card">
            <div class="layui-card-header">
                <h3 class="layui-card-title">项目统计</h3>
            </div>
            <div class="layui-card-body">
                <div class="layui-row layui-col-space15">
                    <div class="layui-col-md3">
                        <div class="layui-card">
                            <div class="layui-card-body text-center">
                                <div class="layui-btn layui-btn-primary layui-btn-radius" style="width: 60px; height: 60px; line-height: 60px; font-size: 24px;">
                                    <i class="layui-icon layui-icon-folder"></i>
                                </div>
                                <div class="layui-card-title mt-3">总项目数</div>
                                <div class="layui-card-subtitle" id="total-projects">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md3">
                        <div class="layui-card">
                            <div class="layui-card-body text-center">
                                <div class="layui-btn layui-btn-normal layui-btn-radius" style="width: 60px; height: 60px; line-height: 60px; font-size: 24px;">
                                    <i class="layui-icon layui-icon-clock"></i>
                                </div>
                                <div class="layui-card-title mt-3">处理中</div>
                                <div class="layui-card-subtitle" id="processing-projects">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md3">
                        <div class="layui-card">
                            <div class="layui-card-body text-center">
                                <div class="layui-btn layui-btn-success layui-btn-radius" style="width: 60px; height: 60px; line-height: 60px; font-size: 24px;">
                                    <i class="layui-icon layui-icon-check"></i>
                                </div>
                                <div class="layui-card-title mt-3">已完成</div>
                                <div class="layui-card-subtitle" id="completed-projects">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md3">
                        <div class="layui-card">
                            <div class="layui-card-body text-center">
                                <div class="layui-btn layui-btn-danger layui-btn-radius" style="width: 60px; height: 60px; line-height: 60px; font-size: 24px;">
                                    <i class="layui-icon layui-icon-star"></i>
                                </div>
                                <div class="layui-card-title mt-3">收藏项目</div>
                                <div class="layui-card-subtitle" id="favorite-projects">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 项目分类和搜索 -->
    <div class="layui-col-md12">
        <div class="layui-card">
            <div class="layui-card-header">
                <div class="layui-row layui-col-space10">
                    <div class="layui-col-md8">
                        <div class="layui-btn-group" lay-filter="project-filter">
                            <button class="layui-btn layui-btn-primary operation-btn" data-filter="all">全部项目</button>
                            <button class="layui-btn layui-btn-primary operation-btn" data-filter="commentary">原创解说</button>
                            <button class="layui-btn layui-btn-primary operation-btn" data-filter="remix">混剪模式</button>
                            <button class="layui-btn layui-btn-primary operation-btn" data-filter="voiceover">AI配音</button>
                        </div>
                    </div>
                    <div class="layui-col-md4">
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <select id="status-filter" class="layui-input" style="max-width: 140px;">
                                <option value="all">全部状态</option>
                                <option value="pending">待处理</option>
                                <option value="processing">处理中</option>
                                <option value="completed">已完成</option>
                                <option value="failed">失败</option>
                            </select>
                            <div class="layui-input-group" style="flex: 1;">
                                <input type="text" id="project-search" placeholder="搜索项目..." class="layui-input">
                                <div class="layui-input-group-btn">
                                    <button class="layui-btn layui-btn-primary operation-btn" onclick="searchProjects()">
                                        <i class="layui-icon layui-icon-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 项目列表 -->
    <div class="layui-col-md12">
        <div class="layui-card">
            <div class="layui-card-header">
                <h3 class="layui-card-title">项目列表</h3>
            </div>
            <div class="layui-card-body">
                <div class="layui-table-responsive">
                    <table class="layui-table" lay-size="sm">
                        <thead>
                            <tr>
                                <th style="width: 40px;">
                                    <input type="checkbox" id="select-all" lay-filter="select-all" title="全选">
                                </th>
                                <th style="width: 80px;">缩略图</th>
                                <th>项目名称</th>
                                <th>项目类型</th>
                                <th>创建时间</th>
                                <th>状态</th>
                                <th style="width: 220px;">
                                    操作
                                    <button class="layui-btn layui-btn-danger layui-btn-xs" 
                                            onclick="batchDeleteProjects()" 
                                            id="batch-delete-btn" 
                                            style="display: none; margin-left: 10px;">
                                        <i class="layui-icon layui-icon-delete"></i>批量删除
                                    </button>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="project-list">
                            <!-- 项目列表将通过JavaScript动态生成 -->
                            <tr>
                                <td colspan="7" class="text-center" style="padding: 60px 20px;">
                                    <div style="
                                        display: flex;
                                        flex-direction: column;
                                        align-items: center;
                                        justify-content: center;
                                        text-align: center;
                                        min-height: 200px;
                                    ">
                                        <i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop" style="
                                            font-size: 40px; 
                                            color: #667eea; 
                                            margin-bottom: 15px;
                                            display: block;
                                        "></i>
                                        <p style="
                                            color: #999; 
                                            margin: 0; 
                                            font-size: 14px;
                                            text-align: center;
                                        ">正在加载项目数据...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页 -->
                <div class="layui-box layui-laypage layui-laypage-default" id="project-pagination">
                    <!-- 分页将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 项目模板 -->
    <div class="layui-col-md12">
        <div class="layui-card mt-15">
            <div class="layui-card-header">
                <h3 class="layui-card-title">项目模板</h3>
            </div>
            <div class="layui-card-body">
                <div class="layui-row layui-col-space15">
                    <div class="layui-col-md3">
                        <div class="layui-card material-item" onclick="createProjectFromTemplate('video_edit')">
                            <div class="layui-card-body text-center">
                                <div class="layui-btn layui-btn-primary layui-btn-radius" style="width: 60px; height: 60px; line-height: 60px; font-size: 24px;">
                                    <i class="layui-icon layui-icon-video"></i>
                                </div>
                                <div class="layui-card-title mt-3">视频编辑</div>
                                <div class="layui-card-subtitle text-sm">基础视频剪辑</div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md3">
                        <div class="layui-card material-item" onclick="createProjectFromTemplate('ai_cut')">
                            <div class="layui-card-body text-center">
                                <div class="layui-btn layui-btn-normal layui-btn-radius" style="width: 60px; height: 60px; line-height: 60px; font-size: 24px;">
                                    <i class="layui-icon layui-icon-magic"></i>
                                </div>
                                <div class="layui-card-title mt-3">AI智能剪辑</div>
                                <div class="layui-card-subtitle text-sm">AI自动剪辑</div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md3">
                        <div class="layui-card material-item" onclick="createProjectFromTemplate('voice_over')">
                            <div class="layui-card-body text-center">
                                <div class="layui-btn layui-btn-success layui-btn-radius" style="width: 60px; height: 60px; line-height: 60px; font-size: 24px;">
                                    <i class="layui-icon layui-icon-microphone"></i>
                                </div>
                                <div class="layui-card-title mt-3">配音解说</div>
                                <div class="layui-card-subtitle text-sm">AI配音+字幕</div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-md3">
                        <div class="layui-card material-item" onclick="createProjectFromTemplate('mixed_cut')">
                            <div class="layui-card-body text-center">
                                <div class="layui-btn layui-btn-danger layui-btn-radius" style="width: 60px; height: 60px; line-height: 60px; font-size: 24px;">
                                    <i class="layui-icon layui-icon-scissors"></i>
                                </div>
                                <div class="layui-card-title mt-3">混剪模式</div>
                                <div class="layui-card-subtitle text-sm">多素材混剪</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 最近活动 -->
    <div class="layui-col-md12">
        <div class="layui-card mt-15">
            <div class="layui-card-header">
                <h3 class="layui-card-title">最近活动</h3>
            </div>
            <div class="layui-card-body">
                <div class="timeline" id="activity-timeline">
                    <!-- 活动记录将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.staticfile.org/layui/2.8.0/layui.js"></script>
<script type="text/javascript">
    layui.use(['element', 'layer', 'form'], function() {
        var element = layui.element;
        var layer = layui.layer;
        var form = layui.form;
        
        // 页面加载完成后获取项目列表
        $(function() {
            console.log('📊 正在从API加载实时数据...');
            layer.msg('🔄 加载实时数据中...', {icon: 16, time: 1000});
            
            // 获取实时数据
            getProjectList();
            getProjectStats();
            getActivityTimeline();
            
            // 设置自动刷新（每30秒）
            setInterval(function() {
                console.log('🔄 自动刷新数据...');
                getProjectStats(); // 只刷新统计，不影响用户浏览
            }, 30000);
            
            console.log('✅ 数据加载完成 - 所有数据来自后端API实时同步');
        });
        
        // 项目筛选（下方按钮组）
        $('.layui-btn-group[lay-filter="project-filter"] .layui-btn').on('click', function() {
            var filter = $(this).data('filter');
            $(this).siblings().removeClass('layui-btn-primary');
            $(this).addClass('layui-btn-primary');

            // 同步顶部标签的激活状态
            $('.filter-tabs .filter-tab').removeClass('active');
            $('.filter-tabs .filter-tab[data-filter="' + filter + '"]').addClass('active');

            var search = $('#project-search').val();
            getProjectList(filter, search);
        });
        
        // 搜索项目
        $('#project-search').on('keypress', function(e) {
            if (e.keyCode === 13) {
                searchProjects();
            }
        });

        // 状态筛选
        $('#status-filter').on('change', function() {
            var filter = $('.layui-btn-group[lay-filter="project-filter"] .layui-btn-primary').data('filter') || 'all';
            var search = $('#project-search').val();
            getProjectList(filter, search);
        });

        // 顶部标签筛选（与项目类型同步）
        $('.filter-tabs .filter-tab').on('click', function() {
            var filter = $(this).data('filter') || 'all';
            $('.filter-tabs .filter-tab').removeClass('active');
            $(this).addClass('active');

            // 同步下方按钮组的选中状态（如果存在对应按钮）
            var btnGroup = $('.layui-btn-group[lay-filter="project-filter"]');
            if (btnGroup && btnGroup.length) {
                btnGroup.find('.layui-btn').removeClass('layui-btn-primary');
                var targetBtn = btnGroup.find('.operation-btn[data-filter="' + filter + '"]');
                if (targetBtn && targetBtn.length) {
                    targetBtn.addClass('layui-btn-primary');
                }
            }

            var search = $('#project-search').val();
            getProjectList(filter, search);
        });
    });
    
    // 获取项目列表（对接当前 /api/projects，按类型与搜索过滤）
    function getProjectList(filter = 'all', search = '') {
        var loading = showLoading();

        // 映射到后端的 type 参数（仅 commentary/remix/voiceover 生效）
        var projectType = null;
        if (filter === 'commentary' || filter === 'remix' || filter === 'voiceover') {
            projectType = filter;
        }

        var params = {
            sort: 'updated_at',
            order: 'desc',
            limit: 200
        };
        if (projectType) {
            params.type = projectType;
        }

        apiRequest('/api/projects', 'GET', params, function(data) {
            hideLoading(loading);
            var projects = (data && data.projects) ? data.projects : [];

            // 前端本地搜索过滤：名称或描述包含关键字
            if (search && search.trim()) {
                var keyword = search.trim().toLowerCase();
                projects = projects.filter(function(p) {
                    var name = (p.name || '').toLowerCase();
                    var desc = (p.description || '').toLowerCase();
                    return name.indexOf(keyword) !== -1 || desc.indexOf(keyword) !== -1;
                });
            }

            // 状态筛选（pending/processing/running/completed/failed 等在前端本地过滤）
            var statusFilter = $('#status-filter').val() || 'all';
            if (statusFilter && statusFilter !== 'all') {
                var statusKey = String(statusFilter).toLowerCase();
                projects = projects.filter(function(p) {
                    var st = String(p.status || '').toLowerCase();
                    if (statusKey === 'processing') {
                        return st === 'processing' || st === 'running';
                    }
                    return st === statusKey;
                });
            }

            renderProjectList(projects);
            // 目前实际仅展示一页，这里用项目数量驱动分页组件清空
            renderPagination(projects.length, 1, projects.length || 1);
        }, function(error) {
            hideLoading(loading);
            layer.msg(error, {icon: 2});
        });
    }
    
    // 渲染项目列表
    function renderProjectList(projects) {
        var projectList = $('#project-list');
        if (!projects || projects.length === 0) {
            projectList.html(`
                <tr>
                    <td colspan="7" class="text-center" style="padding: 60px 20px;">
                        <div style="
                            background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%); 
                            border-radius: 20px; 
                            padding: 50px 40px; 
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            text-align: center;
                            min-height: 360px;
                            height: 360px;
                            width: 100%;
                        ">
                            <i class="layui-icon layui-icon-folder-open" style="
                                font-size: 64px; 
                                color: #667eea; 
                                margin-bottom: 20px; 
                                display: block;
                            "></i>
                            <h3 style="
                                color: #667eea; 
                                margin: 0 0 15px 0; 
                                font-size: 20px; 
                                font-weight: 600;
                                text-align: center;
                            ">📦 暂无项目数据</h3>
                            <p style="
                                color: #999; 
                                margin: 0 0 30px 0; 
                                font-size: 14px; 
                                line-height: 1.8;
                                text-align: center;
                                max-width: 400px;
                            ">
                                ✨ 所有数据来自后端API实时同步<br>
                                🔄 数据会自动刷新，无需手动操作
                            </p>
                            <button class="layui-btn layui-btn-normal operation-btn" onclick="createNewProject()" 
                                    style="
                                        display: inline-flex;
                                        align-items: center;
                                        justify-content: center;
                                        gap: 8px;
                                        padding: 12px 30px;
                                        font-size: 16px;
                                        border-radius: 12px;
                                    ">
                                <i class="layui-icon layui-icon-add"></i> 创建第一个项目
                            </button>
                        </div>
                    </td>
                </tr>
            `);
            console.log('⚠️ API返回空数据 - 请通过"创建项目"按钮添加项目');
            return;
        }
        
        var html = '';
        projects.forEach((project, index) => {
            var statusClass = '';
            var statusText = '';
            
            switch(project.status) {
                case 'pending':
                    statusClass = 'status-pending';
                    statusText = '等待中';
                    break;
                case 'processing':
                case 'running':
                    statusClass = 'status-processing';
                    statusText = '处理中';
                    break;
                case 'completed':
                    statusClass = 'status-completed';
                    statusText = '已完成';
                    break;
                case 'failed':
                    statusClass = 'status-failed';
                    statusText = '失败';
                    break;
                default:
                    statusClass = 'status-pending';
                    statusText = '未知';
            }
            
            var typeText = '';
            switch(project.type) {
                case 'commentary':
                    typeText = '原创解说';
                    break;
                case 'remix':
                    typeText = '混剪模式';
                    break;
                case 'voiceover':
                    typeText = 'AI配音';
                    break;
                case 'video_edit':
                    typeText = '视频编辑';
                    break;
                case 'ai_cut':
                    typeText = 'AI剪辑';
                    break;
                case 'voice_over':
                    typeText = '配音解说';
                    break;
                case 'mixed_cut':
                    typeText = '混剪模式';
                    break;
                default:
                    typeText = '其他';
            }
            
            var projectName = project.name || '未命名项目';
            var metaParts = [];
            try {
                var rawCfg = project.config;
                if (rawCfg) {
                    var cfg = (typeof rawCfg === 'string') ? JSON.parse(rawCfg) : rawCfg;
                    if (cfg && typeof cfg === 'object') {
                        var tplName = cfg.template;
                        var outFmt = cfg.output_format || cfg.format;
                        var outQuality = cfg.quality || cfg.output_quality;
                        if (tplName) {
                            metaParts.push('模板：' + tplName);
                        }
                        if (outFmt || outQuality) {
                            var outLabel = '输出：' + [outFmt, outQuality].filter(Boolean).join('/');
                            metaParts.push(outLabel);
                        }
                    }
                }
            } catch (e) {
                console.log('解析项目配置失败:', e);
            }
            var metaText = metaParts.join(' · ');
            var nameCellHtml = '<div class="project-name-main" title="' + projectName + '">' + projectName + '</div>';
            if (metaText) {
                nameCellHtml += '<div class="project-name-meta">' + metaText + '</div>';
            }
            
            html += `
                <tr data-project-id="${project.id}">
                    <td>
                        <input type="checkbox" class="project-checkbox" value="${project.id}" lay-filter="project-check">
                    </td>
                    <td>
                        <img src="${project.thumbnail || '/static/img/default-thumbnail.jpg'}" 
                             alt="项目缩略图" style="width: 60px; height: 40px; object-fit: cover; border-radius: 4px;">
                    </td>
                    <td>${nameCellHtml}</td>
                    <td>${typeText}</td>
                    <td>${formatDate(project.created_at)}</td>
                    <td><span class="task-status ${statusClass}" id="project-status-${project.id}">${statusText}</span></td>
                    <td>
                        <div class="layui-btn-group">
                            <button class="layui-btn layui-btn-primary layui-btn-sm operation-btn" 
                                    onclick="openProject('${project.id}')" 
                                    title="打开项目进行编辑">
                                <i class="layui-icon layui-icon-edit"></i>编辑
                            </button>
                            <button class="layui-btn layui-btn-normal layui-btn-sm operation-btn" 
                                    onclick="previewProject('${project.id}')"
                                    title="预览项目">
                                <i class="layui-icon layui-icon-play"></i>预览
                            </button>
                            <button class="layui-btn layui-btn-danger layui-btn-sm operation-btn" 
                                    onclick="deleteProject('${project.id}', '${project.name}')"
                                    title="删除此项目（不可恢复）"
                                    style="background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);">
                                <i class="layui-icon layui-icon-delete"></i>删除
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
        
        projectList.html(html);
        
        // 重新绑定复选框事件
        $('.project-checkbox').on('change', updateBatchDeleteBtn);
        $('#select-all').on('change', function() {
            var checked = $(this).prop('checked');
            $('.project-checkbox').prop('checked', checked);
            updateBatchDeleteBtn();
        });
    }
    
    // 更新批量删除按钮状态
    function updateBatchDeleteBtn() {
        var checkedCount = $('.project-checkbox:checked').length;
        var batchBtn = $('#batch-delete-btn');
        
        if (checkedCount > 0) {
            batchBtn.show().text(`批量删除 (${checkedCount})`);
        } else {
            batchBtn.hide();
        }
    }
    
    // 批量删除项目
    function batchDeleteProjects() {
        var checkedIds = [];
        $('.project-checkbox:checked').each(function() {
            checkedIds.push($(this).val());
        });
        
        if (checkedIds.length === 0) {
            layer.msg('请先选择要删除的项目', {icon: 0, time: 2000});
            return;
        }
        
        layer.confirm(`
            <div style="padding: 20px; text-align: center;">
                <i class="layui-icon layui-icon-delete" style="font-size: 64px; color: #ff6b6b;"></i>
                <h3 style="margin: 15px 0; color: #333;">⚠️ 批量删除确认</h3>
                <p style="margin: 10px 0; color: #666; font-size: 15px;">
                    已选择 <strong style="color: #ff6b6b; font-size: 24px;">${checkedIds.length}</strong> 个项目
                </p>
                <p style="margin: 15px 0; color: #ff6b6b; font-size: 14px; line-height: 1.8;">
                    ⚠️ 这些项目将从数据库中永久删除<br>
                    ⚠️ 删除后无法恢复！<br>
                    ⚠️ 请仔细确认后再操作
                </p>
            </div>
        `, {
            title: '🗑️ 批量删除确认',
            btn: ['确定删除', '取消'],
            btnAlign: 'c',
            yes: function(index) {
                layer.close(index);
                var loading = showLoading(`正在删除 ${checkedIds.length} 个项目...`);
                
                apiRequest('/api/projects/batch-delete', 'POST', {
                    project_ids: checkedIds
                }, function(data) {
                    hideLoading(loading);
                    layer.msg(`✅ 成功删除 ${checkedIds.length} 个项目`, {icon: 1, time: 2000});
                    // 实时刷新所有数据
                    getProjectList();
                    getProjectStats();
                    getActivityTimeline();
                    $('#select-all').prop('checked', false);
                    console.log(`✅ 批量删除完成 - 已删除 ${checkedIds.length} 个项目`);
                }, function(error) {
                    hideLoading(loading);
                    layer.msg('❌ ' + (error || '批量删除失败'), {icon: 2, time: 2000});
                });
            }
        });
    }
    
    // 渲染分页
    function renderPagination(total, page, limit) {
        var pagination = $('#project-pagination');
        var totalPages = Math.ceil(total / limit);
        
        if (totalPages <= 1) {
            pagination.html('');
            return;
        }
        
        var html = '<div class="layui-box layui-laypage layui-laypage-default">';
        
        // 上一页
        if (page > 1) {
            html += `<a href="javascript:;" class="layui-laypage-prev" onclick="changePage(${page - 1})">上一页</a>`;
        }
        
        // 页码
        for (var i = 1; i <= totalPages; i++) {
            if (i === page) {
                html += `<span class="layui-laypage-curr"><em class="layui-laypage-em"></em><em>${i}</em></span>`;
            } else {
                html += `<a href="javascript:;" onclick="changePage(${i})">${i}</a>`;
            }
        }
        
        // 下一页
        if (page < totalPages) {
            html += `<a href="javascript:;" class="layui-laypage-next" onclick="changePage(${page + 1})">下一页</a>`;
        }
        
        html += '</div>';
        pagination.html(html);
    }
    
    // 切换页码
    function changePage(page) {
        // 当前实现中项目列表一次性加载到前端，并按本地条件过滤，分页仅作占位
        // 这里复用统一的 getProjectList 逻辑，避免使用已废弃的后端分页参数
        var filter = $('.layui-btn-group[lay-filter="project-filter"] .layui-btn-primary').data('filter');
        var search = $('#project-search').val();
        getProjectList(filter, search);
    }
    
    // 获取项目统计
    function getProjectStats() {
        apiRequest('/api/project/stats', 'GET', {}, function(data) {
            $('#total-projects').text(data.total || 0);
            $('#processing-projects').text(data.processing || 0);
            $('#completed-projects').text(data.completed || 0);
            $('#favorite-projects').text(data.favorite || 0);
        });
    }
    
    // 获取活动时间线
    function getActivityTimeline() {
        apiRequest('/api/activity/timeline', 'GET', {}, function(data) {
            renderTimeline(data.activities || []);
        });
    }
    
    // 渲染时间线
    function renderTimeline(activities) {
        var timeline = $('#activity-timeline');
        if (activities.length === 0) {
            timeline.html('<p class="text-center text-gray-500">暂无活动记录</p>');
            return;
        }
        
        var html = '';
        activities.forEach(activity => {
            html += `
                <div class="timeline-item">
                    <div class="layui-card">
                        <div class="layui-card-body">
                            <div class="layui-row layui-col-space10">
                                <div class="layui-col-md8">
                                    <h4 class="layui-card-title">${activity.title}</h4>
                                    <p class="layui-card-subtitle">${activity.description}</p>
                                </div>
                                <div class="layui-col-md4 text-right">
                                    <span class="text-gray-500 text-sm">${formatDate(activity.created_at)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        timeline.html(html);
    }
    
    // 创建新项目
    function createNewProject() {
        layer.open({
            type: 1,
            title: '创建新项目',
            area: ['500px', '300px'],
            content: `
                <div class="layui-card">
                    <div class="layui-card-body">
                        <form class="layui-form" lay-filter="create-project-form">
                            <div class="layui-form-item">
                                <label class="layui-form-label">项目名称</label>
                                <div class="layui-input-block">
                                    <input type="text" name="name" placeholder="请输入项目名称" required class="layui-input">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">项目类型</label>
                                <div class="layui-input-block">
                                    <select name="type" required>
                                        <option value="video_edit">视频编辑</option>
                                        <option value="ai_cut">AI剪辑</option>
                                        <option value="voice_over">配音解说</option>
                                        <option value="mixed_cut">混剪模式</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">项目描述</label>
                                <div class="layui-input-block">
                                    <textarea name="description" placeholder="请输入项目描述" class="layui-textarea"></textarea>
                                </div>
                            </div>
                            <div class="layui-form-item text-center">
                                <button class="layui-btn layui-btn-primary" type="button" onclick="submitCreateProject()">
                                    <i class="layui-icon layui-icon-add"></i>创建项目
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `,
            success: function(layero, index) {
                layui.use('form', function() {
                    var form = layui.form;
                    form.render();
                });
            }
        });
    }
    
    // 提交创建项目
    function submitCreateProject() {
        var name = $('input[name="name"]').val();
        var type = $('select[name="type"]').val();
        var description = $('textarea[name="description"]').val();
        
        if (!name.trim()) {
            layer.msg('请输入项目名称', {icon: 2});
            return;
        }
        
        var loading = showLoading();
        apiRequest('/api/projects', 'POST', {
            name: name,
            type: type,
            description: description
        }, function(data) {
            hideLoading(loading);
            layer.closeAll();
            layer.msg('项目创建成功', {icon: 1});
            getProjectList();
            getProjectStats();
        }, function(error) {
            hideLoading(loading);
            layer.msg(error, {icon: 2});
        });
    }
    
    // 从模板创建项目
    function createProjectFromTemplate(templateType) {
        var typeText = '';
        switch(templateType) {
            case 'video_edit':
                typeText = '视频编辑';
                break;
            case 'ai_cut':
                typeText = 'AI剪辑';
                break;
            case 'voice_over':
                typeText = '配音解说';
                break;
            case 'mixed_cut':
                typeText = '混剪模式';
                break;
        }
        
        layer.prompt({
            title: `创建${typeText}项目`,
            formType: 3,
            value: `${typeText}项目_${new Date().getTime()}`
        }, function(name, index) {
            layer.close(index);
            var loading = showLoading();
            apiRequest('/api/projects', 'POST', {
                name: name,
                type: templateType,
                template: templateType
            }, function(data) {
                hideLoading(loading);
                layer.msg('项目创建成功', {icon: 1});
                getProjectList();
                getProjectStats();
            }, function(error) {
                hideLoading(loading);
                layer.msg(error, {icon: 2});
            });
        });
    }
    
    // 打开项目 - 完整实现版本
    function openProject(projectId) {
        console.log(`🎬 正在打开项目: ${projectId}`);
        
        var loading = showLoading('正在加载项目数据...');
        
        // 从后端API获取完整项目数据
        apiRequest(`/api/projects/${projectId}`, 'GET', {}, function(response) {
            hideLoading(loading);
            
            if (response.data) {
                // 将完整项目数据保存到sessionStorage供编辑器使用
                sessionStorage.setItem('current_project_id', projectId);
                sessionStorage.setItem('current_project_data', JSON.stringify(response.data));
                
                console.log('✅ 项目数据已加载:', response.data);
                layer.msg('✅ 项目加载成功', {icon: 1, time: 1000});
                
                // 延迟跳转，确保数据已保存
                setTimeout(function() {
                    // 跳转到编辑器页面
                    window.location.href = `/editor?project_id=${projectId}`;
                }, 500);
            } else {
                layer.msg('❌ 项目数据为空', {icon: 2});
            }
        }, function(error) {
            hideLoading(loading);
            console.error('❌ 加载项目失败:', error);
            layer.msg('❌ 加载项目失败: ' + (error || '未知错误'), {icon: 2, time: 2000});
        });
    }
    
    // 预览项目 - 完整实现版本
    function previewProject(projectId) {
        console.log(`👁️ 正在预览项目: ${projectId}`);
        
        var loading = showLoading('正在加载项目信息...');
        
        // 从后端API获取完整项目数据
        apiRequest(`/api/projects/${projectId}`, 'GET', {}, function(response) {
            hideLoading(loading);
            
            if (response.data) {
                var project = response.data;
                
                // 格式化项目类型
                var typeText = {
                    'video_edit': '视频编辑',
                    'ai_cut': 'AI剪辑',
                    'voice_over': '配音解说',
                    'mixed_cut': '混剪模式'
                }[project.type] || project.type;
                
                // 格式化项目状态
                var statusText = {
                    'draft': '草稿',
                    'processing': '处理中',
                    'completed': '已完成',
                    'archived': '已归档'
                }[project.status] || project.status;
                
                var statusColor = {
                    'draft': '#909399',
                    'processing': '#409EFF',
                    'completed': '#67C23A',
                    'archived': '#E6A23C'
                }[project.status] || '#909399';
                
                // 显示详细预览对话框
                layer.open({
                    type: 1,
                    title: '📋 项目预览 - ' + project.name,
                    area: ['900px', '650px'],
                    content: `
                        <div style="padding: 30px; background: #f8f9fa;">
                            <!-- 项目基本信息 -->
                            <div style="background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">
                                <h3 style="margin: 0 0 20px 0; font-size: 22px; color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px;">
                                    <i class="layui-icon layui-icon-template-1"></i> ${project.name}
                                </h3>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                                    <div style="padding: 12px; background: #f0f2f5; border-radius: 8px;">
                                        <strong style="color: #666;">📁 项目类型：</strong>
                                        <span style="color: #333;">${typeText}</span>
                                    </div>
                                    <div style="padding: 12px; background: #f0f2f5; border-radius: 8px;">
                                        <strong style="color: #666;">📊 状态：</strong>
                                        <span style="color: ${statusColor}; font-weight: 600;">● ${statusText}</span>
                                    </div>
                                    <div style="padding: 12px; background: #f0f2f5; border-radius: 8px;">
                                        <strong style="color: #666;">📅 创建时间：</strong>
                                        <span style="color: #333;">${formatDate(project.created_at)}</span>
                                    </div>
                                    <div style="padding: 12px; background: #f0f2f5; border-radius: 8px;">
                                        <strong style="color: #666;">🔄 更新时间：</strong>
                                        <span style="color: #333;">${formatDate(project.updated_at)}</span>
                                    </div>
                                </div>
                                ${project.description ? `
                                    <div style="background: linear-gradient(135deg, rgba(102,126,234,0.05) 0%, rgba(118,75,162,0.05) 100%); padding: 15px; border-radius: 10px; border-left: 4px solid #667eea; margin-top: 15px;">
                                        <strong style="color: #666; display: block; margin-bottom: 8px;">📝 项目描述：</strong>
                                        <p style="margin: 0; color: #555; line-height: 1.6;">${project.description}</p>
                                    </div>
                                ` : ''}
                            </div>
                            
                            <!-- 项目设置信息 -->
                            ${project.settings ? `
                                <div style="background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">
                                    <h4 style="margin: 0 0 15px 0; color: #333; font-size: 16px;">⚙️ 项目设置</h4>
                                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                                        ${project.settings.resolution ? `
                                            <div style="padding: 10px; background: #f0f2f5; border-radius: 8px; text-align: center;">
                                                <div style="color: #999; font-size: 12px;">分辨率</div>
                                                <div style="color: #333; font-weight: 600; margin-top: 5px;">${project.settings.resolution}</div>
                                            </div>
                                        ` : ''}
                                        ${project.settings.framerate ? `
                                            <div style="padding: 10px; background: #f0f2f5; border-radius: 8px; text-align: center;">
                                                <div style="color: #999; font-size: 12px;">帧率</div>
                                                <div style="color: #333; font-weight: 600; margin-top: 5px;">${project.settings.framerate}fps</div>
                                            </div>
                                        ` : ''}
                                        ${project.settings.duration ? `
                                            <div style="padding: 10px; background: #f0f2f5; border-radius: 8px; text-align: center;">
                                                <div style="color: #999; font-size: 12px;">时长</div>
                                                <div style="color: #333; font-weight: 600; margin-top: 5px;">${project.settings.duration}s</div>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            ` : ''}
                            
                            <!-- 操作按钮 -->
                            <div style="text-align: center; margin-top: 25px;">
                                <button class="layui-btn layui-btn-normal layui-btn-lg" onclick="openProject('${projectId}'); layer.closeAll();" style="padding: 12px 35px; border-radius: 10px; font-size: 15px;">
                                    <i class="layui-icon layui-icon-edit"></i> 打开编辑
                                </button>
                                <button class="layui-btn layui-btn-primary layui-btn-lg" onclick="layer.closeAll();" style="padding: 12px 35px; border-radius: 10px; font-size: 15px; margin-left: 15px;">
                                    <i class="layui-icon layui-icon-close"></i> 关闭
                                </button>
                            </div>
                        </div>
                    `
                });

                // 原创解说项目：尝试在预览中追加成片结果
                if (project.type === 'commentary' && project.result) {
                    try {
                        var resObj = (typeof project.result === 'string') ? JSON.parse(project.result) : project.result;
                        var outPath = resObj && resObj.output_path;
                        if (outPath) {
                            var videoUrl = outPath.toString();
                            if (videoUrl && !videoUrl.startsWith('/')) {
                                videoUrl = '/' + videoUrl;
                            }
                            var $content = $('.layui-layer-content').last().find('> div').first();
                            if ($content && $content.length) {
                                var extra = document.createElement('div');
                                extra.style.marginTop = '20px';
                                extra.innerHTML = '' +
                                    '<div style="background:#fff;padding:16px;border-radius:12px;border-left:4px solid #22c55e;">' +
                                        '<div style="font-weight:600;margin-bottom:8px;color:#14532d;">🎬 原创解说成片预览</div>' +
                                        '<video src="' + videoUrl + '" controls style="width:100%;max-height:320px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.25);"></video>' +
                                    '</div>';
                                $content[0].appendChild(extra);
                            }
                        }
                    } catch (e) {
                        console.error('解析原创解说结果失败:', e);
                    }
                }

                console.log('✅ 项目预览数据:', project);
            } else {
                layer.msg('❌ 项目数据为空', {icon: 2});
            }
        }, function(error) {
            hideLoading(loading);
            console.error('❌ 加载预览失败:', error);
            layer.msg('❌ 加载预览失败: ' + (error || '未知错误'), {icon: 2, time: 2000});
        });
    }
    
    // 删除项目
    function deleteProject(projectId, projectName) {
        layer.confirm(`
            <div style="padding: 20px; text-align: center;">
                <i class="layui-icon layui-icon-delete" style="font-size: 48px; color: #ff6b6b;"></i>
                <h3 style="margin: 15px 0; color: #333;">⚠️ 确定要删除项目吗？</h3>
                <p style="margin: 10px 0; color: #666; font-size: 14px;">
                    项目名称：<strong style="color: #ff6b6b;">${projectName}</strong>
                </p>
                <p style="margin: 10px 0; color: #ff6b6b; font-size: 13px;">
                    ⚠️ 此操作将从数据库中永久删除<br>
                    ⚠️ 删除后无法恢复，请谨慎操作！
                </p>
            </div>
        `, {
            title: '🗑️ 删除确认',
            btn: ['确定删除', '取消'],
            btnAlign: 'c',
            yes: function(index) {
                layer.close(index);
                var loading = showLoading('正在删除...');
                apiRequest(`/api/projects/${projectId}`, 'DELETE', {}, function(data) {
                    hideLoading(loading);
                    layer.msg('✅ 项目已从数据库删除', {icon: 1, time: 2000});
                    // 实时刷新数据
                    getProjectList();
                    getProjectStats();
                    getActivityTimeline();
                    console.log(`✅ 项目 ${projectId} 已删除 - 数据已同步更新`);
                }, function(error) {
                    hideLoading(loading);
                    layer.msg('❌ ' + (error || '删除失败'), {icon: 2, time: 2000});
                });
            }
        });
    }
    
    // 搜索项目
    function searchProjects() {
        var search = $('#project-search').val();
        var filter = $('.layui-btn-group[lay-filter="project-filter"] .layui-btn-primary').data('filter');
        getProjectList(filter, search);
    }
    
    // 格式化日期
    function formatDate(dateString) {
        var date = new Date(dateString);
        return date.toLocaleString('zh-CN');
    }
    
    // 刷新项目列表 - 完整实现版本，刷新所有数据
    function refreshProjects() {
        console.log('🔄 手动刷新项目数据...');
        
        var loading = showLoading('正在刷新数据...');
        
        // 刷新所有数据
        Promise.all([
            new Promise((resolve) => {
                getProjectList();
                setTimeout(resolve, 100);
            }),
            new Promise((resolve) => {
                getProjectStats();
                setTimeout(resolve, 100);
            }),
            new Promise((resolve) => {
                getActivityTimeline();
                setTimeout(resolve, 100);
            })
        ]).then(() => {
            hideLoading(loading);
            console.log('✅ 数据刷新完成');
            layer.msg('✅ 数据已刷新', {icon: 1, time: 1500});
        }).catch((error) => {
            hideLoading(loading);
            console.error('❌ 刷新失败:', error);
            layer.msg('刷新完成', {icon: 1, time: 1000});
        });
    }
    
    // 渲染时间线
    function renderTimeline(activities) {
        var timeline = $('#activity-timeline');
        if (!activities || activities.length === 0) {
            timeline.html(`
                <div style="text-align: center; padding: 40px; color: #ccc;">
                    <i class="layui-icon layui-icon-time" style="font-size: 48px;"></i>
                    <p style="margin-top: 15px;">暂无活动记录</p>
                </div>
            `);
            return;
        }
        
        var html = '';
        activities.forEach(function(activity) {
            html += `
                <div class="timeline-item" id="activity-${activity.id}">
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px;">
                        <div style="flex: 1;">
                            <div class="timeline-time" style="color: #999; font-size: 13px; margin-bottom: 5px;">
                                ${formatDate(activity.created_at)}
                            </div>
                            <div class="timeline-content" style="color: #333; font-size: 14px;">
                                ${activity.description || activity.title || '无描述'}
                            </div>
                        </div>
                        <button class="layui-btn layui-btn-danger layui-btn-xs" onclick="deleteActivity('${activity.id}')" 
                                title="删除此活动记录">
                            <i class="layui-icon layui-icon-delete"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        timeline.html(html);
    }
    
    // 删除活动记录
    function deleteActivity(activityId) {
        layer.confirm('确定要删除这条活动记录以及对应的项目吗？此操作会删除该项目，且不可恢复。', {
            title: '删除活动及项目确认',
            btn: ['确定', '取消'],
            icon: 3,
            skin: 'layer-ext-moon'
        }, function(index) {
            layer.close(index);
            var loading = showLoading('删除中...');
            apiRequest(`/api/activity/${activityId}`, 'DELETE', {}, function(data) {
                hideLoading(loading);
                layer.msg('✅ 删除成功', {icon: 1, time: 1500});
                // 从DOM中移除
                $(`#activity-${activityId}`).fadeOut(300, function() {
                    $(this).remove();
                    // 检查是否还有活动记录
                    if ($('#activity-timeline .timeline-item').length === 0) {
                        $('#activity-timeline').html(`
                            <div style="text-align: center; padding: 40px; color: #ccc;">
                                <i class="layui-icon layui-icon-time" style="font-size: 48px;"></i>
                                <p style="margin-top: 15px;">暂无活动记录</p>
                            </div>
                        `);
                    }
                });
            }, function(error) {
                hideLoading(loading);
                layer.msg('❌ ' + (error || '删除失败'), {icon: 2, time: 2000});
            });
        });
    }
    
    // 显示加载动画
    function showLoading(message = '加载中...') {
        return layer.msg(message, {
            icon: 16,
            shade: 0.01,
            time: 0
        });
    }
    
    // 隐藏加载动画
    function hideLoading(index) {
        layer.close(index);
    }
    
    // API请求封装
    function apiRequest(url, method = 'GET', data = {}, successCallback, errorCallback) {
        $.ajax({
            url: url,
            type: method,
            data: method === 'GET' ? data : JSON.stringify(data),
            contentType: method === 'GET' ? 'application/x-www-form-urlencoded' : 'application/json',
            dataType: 'json',
            success: function(response) {
                if (response.code === 0 || response.success) {
                    if (successCallback) successCallback(response.data || response);
                } else {
                    if (errorCallback) errorCallback(response.msg || response.message || '请求失败');
                }
            },
            error: function(xhr, status, error) {
                if (errorCallback) errorCallback('网络请求失败: ' + error);
            }
        });
    }
    
    // 确认操作
    function confirmAction(title, content, callback) {
        layer.confirm(content, {
            title: title,
            btn: ['确定', '取消'],
            yes: function(index) {
                layer.close(index);
                if (callback) callback();
            }
        });
    }
</script>

</body>
</html>
