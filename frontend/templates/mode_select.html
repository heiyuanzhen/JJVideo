<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择剪辑模式 - AIJian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.9);
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: #667eea;
            color: white;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .modes-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .mode-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .mode-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .mode-card.commentary .mode-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .mode-card.remix .mode-icon {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .mode-card.voiceover .mode-icon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .mode-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .mode-description {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        .mode-features {
            list-style: none;
            margin-bottom: 25px;
        }

        .mode-features li {
            padding: 8px 0;
            font-size: 14px;
            color: #555;
            display: flex;
            align-items: center;
        }

        .mode-features li:before {
            content: "✓";
            color: #4CAF50;
            font-weight: bold;
            margin-right: 10px;
            font-size: 18px;
        }

        .mode-button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-card.commentary .mode-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .mode-card.remix .mode-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .mode-card.voiceover .mode-button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .mode-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <!-- 返回首页按钮 -->
    <a href="/" class="back-button">
        <span>←</span>
        <span>返回首页</span>
    </a>

    <div class="header">
        <h1>选择剪辑模式</h1>
        <p>根据您的需求选择合适的剪辑模式，快速AI生成视频内容</p>
    </div>

    <div class="modes-container">
        <!-- 原创解说剪辑 -->
        <div class="mode-card commentary" onclick="selectMode('commentary')">
            <div class="mode-icon">🎙️</div>
            <h2 class="mode-title">原创解说剪辑</h2>
            <p class="mode-description">
                AI自动剪辑+智能配音配乐，一键生成专业解说视频
            </p>
            <ul class="mode-features">
                <li>AI自动剪辑</li>
                <li>智能配音配乐</li>
                <li>文稿生成</li>
            </ul>
            <button class="mode-button">开始创作</button>
        </div>

        <!-- 混剪模式 -->
        <div class="mode-card remix" onclick="selectMode('remix')">
            <div class="mode-icon">✂️</div>
            <h2 class="mode-title">混剪模式</h2>
            <p class="mode-description">
                批量处理多个视频，智能识别精彩片段，多种风格混剪
            </p>
            <ul class="mode-features">
                <li>批量处理</li>
                <li>智能识别</li>
                <li>多种风格</li>
            </ul>
            <button class="mode-button">开始混剪</button>
        </div>

        <!-- AI配音 -->
        <div class="mode-card voiceover" onclick="selectMode('voiceover')">
            <div class="mode-icon">🔊</div>
            <h2 class="mode-title">AI配音</h2>
            <p class="mode-description">
                多种AI音色，文字转语音生成，语速语调自由调整
            </p>
            <ul class="mode-features">
                <li>多种AI音色</li>
                <li>文字转语音生成</li>
                <li>语速语调调整</li>
            </ul>
            <button class="mode-button">开始配音</button>
        </div>
    </div>

    <script>
        function selectMode(mode) {
            // 跳转到对应的功能页面
            const pages = {
                'commentary': '/commentary',
                'remix': '/remix',
                'voiceover': '/voiceover'
            };
            
            if (pages[mode]) {
                window.location.href = pages[mode];
            }
        }
    </script>
</body>
</html>
